<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="robots" content="index, follow" />
        <title>Speed Roulette</title>

        <!-- Favicon -->
        <link rel="icon" type="image/svg+xml" href="/logo.svg" />

        <!-- SEO Meta -->
        <meta
            name="description"
            content="Quick thinking meets high-stakes action in this fast-paced roulette twist! Play bold, win big, and climb the leaderboard!"
        />
        <link rel="canonical" href="https://speedroulette.io/" />

        <!-- Open Graph (for Discord, Facebook, etc.) -->
        <meta property="og:title" content="Speed Roulette" />
        <meta
            property="og:description"
            content="Quick thinking meets high-stakes action in this fast-paced roulette twist! Play bold, win big, and climb the leaderboard!"
        />
        <meta property="og:url" content="https://speedroulette.io/" />
        <meta property="og:type" content="website" />
        <meta property="og:image" content="https://speedroulette.io/preview.png" />
        <meta property="og:image:alt" content="Speed Roulette Preview Image" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Speed Roulette" />
        <meta
            name="twitter:description"
            content="Quick thinking meets high-stakes action in this fast-paced roulette twist! Play bold, win big, and climb the leaderboard!"
        />
        <meta name="twitter:image" content="https://speedroulette.io/preview.png" />

        <!-- Prevent white flash before React loads -->
        <script>
            try {
                const storedTheme = localStorage.getItem('site_theme');

                document.documentElement.setAttribute('data-theme', storedTheme === 'light' ? 'light' : 'dark');
            } catch (_) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        </script>

        <style>
            html[data-theme='dark'] {
                background-color: #111827;
                color: white;
            }

            html[data-theme='light'] {
                background-color: #e9eef3;
                color: black;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <div id="modal-root"></div>
        <script type="module" src="./src/main.tsx"></script>
    </body>
</html>
