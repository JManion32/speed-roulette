# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name speedroulette.io www.speedroulette.io;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name speedroulette.io www.speedroulette.io;

    ssl_certificate /etc/letsencrypt/live/speedroulette.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/speedroulette.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Disable directory listing and limit request size
    autoindex off;
    client_max_body_size 1M;

    # Block hidden/dotfiles (e.g. .env, .git)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Block suspicious User-Agents
    if ($http_user_agent ~* (curl|wget|python|scanner|nmap|masscan)) {
        return 403;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 10s;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    }

    # Serve frontend SPA
    location / {
        try_files $uri /index.html;
    }
}
