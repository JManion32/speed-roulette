name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
    stylelint:
        name: Stylelint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run Stylelint
              run: npx stylelint "**/*.css"

            - name: Build Web UI
              run: npm run build

    prettier:
        name: Prettier
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run Prettier
              run: npx prettier --check "."

            - name: Build Web UI
              run: npm run build

    eslint:
        name: ESLint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npx eslint .
              working-directory:

            - name: Build Web UI
              run: npm run build

    go-lint:
        name: Go Lint
        runs-on: ubuntu-latest

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Set up Go
            uses: actions/setup-go@v5
            with:
              go-version: '1.22'

          - name: Install Go dependencies
            run: go mod download
            working-directory: server

          - name: Run Go lint
            run: |
              go install golang.org/x/lint/golint@latest
              golint ./...
            working-directory: server

    go-fmt:
        name: Go Format
        runs-on: ubuntu-latest

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Set up Go
            uses: actions/setup-go@v5
            with:
              go-version: '1.22'

          - name: Install Go dependencies
            run: go mod download
            working-directory: server

          - name: Check Go Formatting
            run: |
              fmt_out=$(gofmt -s -l .)
              if [ -n "$fmt_out" ]; then
                echo "Go files not properly formatted:"
                echo "$fmt_out"
                exit 1
              fi
            working-directory: server

    go-unit:
        name: Go Unit
        runs-on: ubuntu-latest

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Set up Go
            uses: actions/setup-go@v5
            with:
              go-version: '1.22'

          - name: Install Go dependencies
            run: go mod download
            working-directory: server

          - name: Run Go Unit Tests
            run: go test -v ./...
            working-directory: server

    docker-build:
      name: Docker Build Test
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Generate dev .env
          run: |
            cat > .env <<'EOF'
            ENV=development
            SITE_HOST_PORT=5173
            SITE_CONTAINER_PORT=80
            NGINX_CONF=nginx.local.conf
            CORS_ORIGIN=http://localhost:5173 
            POSTGRES_USERNAME=user
            POSTGRES_PASSWORD=pass
            POSTGRES_DB_NAME=speed-roulette
            POSTGRES_DB_HOST=db
            POSTGRES_DB_PORT=5432
            REDIS_ADDRESS=redis:6379
            REDIS_PASSWORD=
            REDIS_DB=0
            EOF

        - name: Build images
          run: docker compose -f compose.yml build

    cypress-home:
      name: Cypress Home
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with: { node-version: '22' }

        - name: Install Cypress & deps
          run: npm ci
          working-directory: site

        - name: Generate dev .env
          run: |
            cat > .env <<'EOF'
            ENV=development
            SITE_HOST_PORT=5173
            SITE_CONTAINER_PORT=80
            NGINX_CONF=nginx.local.conf
            CORS_ORIGIN=http://localhost:5173 
            POSTGRES_USERNAME=user
            POSTGRES_PASSWORD=pass
            POSTGRES_DB_NAME=speed-roulette
            POSTGRES_DB_HOST=db
            POSTGRES_DB_PORT=5432
            REDIS_ADDRESS=redis:6379
            REDIS_PASSWORD=
            REDIS_DB=0
            EOF

        - name: Start stack
          run: docker compose -f compose.yml up -d

        - name: Wait for site
          uses: jakejarvis/wait-action@master
          with: { url: http://localhost:5173, timeout: 60 }

        - name: Run Cypress
          run: npx cypress run --spec "site/cypress/e2e/home.cy.ts"

        - name: Stop stack
          if: always()
          run: docker compose -f compose.yml down --volumes

    cypress-game:
      name: Cypress Game
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with: { node-version: '22' }

        - name: Install Cypress & dependencies
          run: npm ci
          working-directory: site

        - name: Generate dev .env
          run: |
            cat > .env <<'EOF'
            ENV=development
            SITE_HOST_PORT=5173
            SITE_CONTAINER_PORT=80
            NGINX_CONF=nginx.local.conf
            CORS_ORIGIN=http://localhost:5173 
            POSTGRES_USERNAME=user
            POSTGRES_PASSWORD=pass
            POSTGRES_DB_NAME=speed-roulette
            POSTGRES_DB_HOST=db
            POSTGRES_DB_PORT=5432
            REDIS_ADDRESS=redis:6379
            REDIS_PASSWORD=
            REDIS_DB=0
            EOF

        - name: Start stack
          run: docker compose -f compose.yml up -d

        - name: Wait for site
          uses: jakejarvis/wait-action@master
          with: { url: http://localhost:5173, timeout: 60 }

        - name: Run Cypress
          run: npx cypress run --spec "site/cypress/e2e/game.cy.ts"

        - name: Stop stack
          if: always()
          run: docker compose -f compose.yml down --volumes